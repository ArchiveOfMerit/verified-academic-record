name: Negative Content Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare folders
        run: |
          mkdir -p "Negative content/review-queue"
          mkdir -p "Negative content/evidence"

      - name: Run negative content bot
        run: |
          python "Negative content/bot/negative_content_quarantine_bot.py" \
            --input "Negative content/bot/manual_urls.jsonl" \
            --output "Negative content/review-queue/review_queue.jsonl" \
            --only-flagged

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "Negative content/review-queue/review_queue.jsonl"

          git diff --cached --quiet || git commit -m "Run negative content bot"

          git push
