<!DOCTYPE html>
<html dir="ltr" lang="en-US" class="local-only redacted-snapshot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src 'self' data:; style-src 'unsafe-inline' 'self'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; connect-src 'none'; frame-src 'none'; object-src 'none'; worker-src 'none';" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex" />
  <meta name="referrer" content="no-referrer" />
  <title>Register of Actions — Local Redacted Copy</title>
  <base href="./" />
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; margin:24px; }
    .card { border:1px solid #333; border-radius:12px; padding:16px; background:#181818; }
    code, pre { white-space:pre-wrap; word-break:break-word; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Register of Actions — Redacted Local Snapshot</h1>
    <p>Remote publication and fetches are blocked at the page level.</p>
  </div>

  <script>
    window.appConfig = {
      copyRightDate: "2026",
      version: "1.0.0.2596",
      virtualDirectory: "./",
      baseUri: "[LOCAL_ONLY]",
      serviceUri: "[LOCAL_ONLY]",
      acceptLanguages: ["en-US","en;q=0.5"],
      token: "[REDACTED_TOKEN]",
      ngNoToken: "",
      isPortalSiteFound: "false",
      portalBaseUri: "[LOCAL_ONLY]",
      portalVirtualDirectoryPath: "./"
    };

    window.omniLoaderConfig = {
      appTitle: "Register of Actions",
      appTitleLink: "#local-only",
      appVirtualDirectory: "./",
      appToken: "[REDACTED_TOKEN]",
      omniDiv: "#omni",
      omniBaseUri: "[LOCAL_ONLY]",
      omniBaseUriService: "[LOCAL_ONLY]",
      omniVersion: "local"
    };

    const blockedArtifacts = {
      clientIP: "[REDACTED_IP]",
      requestId: "[REDACTED_REQUEST_ID]",
      email: "[REDACTED_EMAIL]",
      firstName: "[REDACTED_NAME]",
      lastName: "[REDACTED_NAME]",
      cellPhone: "[REDACTED_PHONE]",
      smsEmail: "[REDACTED_PHONE]",
      viewSource: "[REDACTED_SOURCE]",
      chromeExtension: "[REDACTED_EXTENSION]",
      embeddedPdfSrc: "[REDACTED_SRC]",
      originalUrl: "[REDACTED_URL]"
    };

    Object.freeze(window.appConfig);
    Object.freeze(window.omniLoaderConfig);
    Object.freeze(blockedArtifacts);
  </script>
</body>
</html>
