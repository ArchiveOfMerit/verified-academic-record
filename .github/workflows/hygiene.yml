name: Hygiene

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          python3 - <<'PY'
          import sys
          from pathlib import Path

          try:
              import yaml
          except ImportError:
              print("PyYAML not available on runner.")
              sys.exit(1)

          bad = []
          for pattern in ("**/*.yml", "**/*.yaml"):
              for f in Path(".").glob(pattern):
                  if ".git/" in str(f):
                      continue
                  try:
                      yaml.safe_load(f.read_text(encoding="utf-8"))
                  except Exception as e:
                      bad.append((str(f), str(e)))

          if bad:
              for file, err in bad:
                  print(f"YAML error in {file}: {err}")
              sys.exit(1)

          print("All YAML files parsed successfully.")
          PY

      - name: Check Markdown links
        uses: github/super-linter/slim@v7
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_MARKDOWN: true
          VALIDATE_YAML: true
          VALIDATE_GITHUB_ACTIONS: true
          FILTER_REGEX_EXCLUDE: '(^|/)(node_modules|vendor|dist|build|\.git)/'

      - name: Upload lint results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hygiene-artifacts
          path: |
            ./**/*.log
            ./**/*.txt
          if-no-files-found: ignore
