name: Hygiene

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yaml-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML files
        run: |
          python3 - <<'PY'
          import sys
          from pathlib import Path

          try:
              import yaml
          except ImportError:
              print("PyYAML not available on runner.")
              sys.exit(1)

          bad = []
          for pattern in ("**/*.yml", "**/*.yaml"):
              for f in Path(".").glob(pattern):
                  try:
                      yaml.safe_load(f.read_text(encoding="utf-8"))
                  except Exception as e:
                      bad.append((str(f), str(e)))

          if bad:
              for file, err in bad:
                  print(f"YAML error in {file}: {err}")
              sys.exit(1)

          print("All YAML files parsed successfully.")
          PY
